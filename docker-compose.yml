version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: smart-grocery-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: smartgrocery
    networks:
      - smart-grocery-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-grocery-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/smartgrocery
      JWT_SECRET: your_jwt_secret_key_change_in_production
      NODE_ENV: development
    depends_on:
      - mongodb
    networks:
      - smart-grocery-network

volumes:
  mongodb_data:

networks:
  smart-grocery-network:
    driver: bridge
